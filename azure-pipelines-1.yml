trigger:
- main

pool:
  name: Default

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

stages:
- stage: CI_Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildOnVM
    displayName: 'Build on your VM'
    steps:
    - task: NuGetToolInstaller@1
    
    - task: NuGetCommand@2
      inputs:
        restoreSolution: '$(solution)'
    
    - task: VSBuild@1
      inputs:
        solution: '$(solution)'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
    
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'

- stage: CD_Deploy
  displayName: 'Deploy Stage'
  jobs:
  - deployment: DeployToVM
    displayName: 'Deploy to your VM'
    pool:
      name: Default
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
          
          - task: CopyFiles@2
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/drop'
              Contents: '**'
              TargetFolder: 'C:\MyDeployedApp'
          
          - script: |
              echo "Deployment completed to C:\MyDeployedApp"
              dir C:\MyDeployedApp
            displayName: 'Verify deployment'