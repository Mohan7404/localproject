trigger:
- main

pool:
  name: Default

stages:
- stage: CI_Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildOnVM
    displayName: 'Build on your VM'
    steps:
    - script: |
        echo "Hello from your VM!"
        echo "Computer name: %COMPUTERNAME%"
        echo "Current directory: %CD%"
        dir
      displayName: 'Test VM Connection'
    
    - script: |
        mkdir C:\TestDeployment 2>nul
        echo "Test file created at %date% %time%" > C:\TestDeployment\test.txt
        type C:\TestDeployment\test.txt
      displayName: 'Create Test File on VM'

- stage: CD_Deploy
  displayName: 'Deploy Stage'
  jobs:
  - deployment: DeployToVM
    displayName: 'Deploy to your VM'
    pool:
      name: Default
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              echo "Deployment stage running on %COMPUTERNAME%"
              dir C:\TestDeployment
            displayName: 'Verify Test Deployment'